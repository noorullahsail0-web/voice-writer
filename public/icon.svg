<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#115e59" />
      <stop offset="100%" stop-color="#042f2e" />
    </linearGradient>
    
    <!-- Accent Golden Glow Grid -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Metallic Mic Gradient -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Sleek Shadows -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    <filter id="micShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#042f2e" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Squircle Base Frame -->
  <rect x="24" y="24" width="464" height="464" rx="100" fill="url(#bgGrad)" stroke="#14b8a6" stroke-width="4" filter="url(#glow)" />

  <!-- Styled Decorative Sound Waves in background -->
  <g opacity="0.15">
    <circle cx="256" cy="256" r="180" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-dasharray="10 10" />
    <circle cx="256" cy="256" r="140" fill="none" stroke="#2dd4bf" stroke-width="1.5" />
    <line x1="56" y1="256" x2="456" y2="256" stroke="#2dd4bf" stroke-width="1" stroke-dasharray="5 5" />
    <line x1="256" y1="56" x2="256" y2="456" stroke="#2dd4bf" stroke-width="1" stroke-dasharray="5 5" />
  </g>

  <!-- Glowing Aura / Accent Orbits -->
  <g filter="url(#glow)">
    <!-- Elegant Pen stroke merged into soundwave -->
    <path d="M 120,290 C 120,180 200,100 320,100 C 370,100 400,120 400,120 L 370,150 C 370,150 350,140 320,140 C 230,140 160,200 160,290" fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round" />
    <!-- Symmetrical Wave representing handwriting & speech conversion -->
    <path d="M 392,222 C 392,332 312,412 192,412 C 142,412 112,392 112,392 L 142,362 C 142,362 162,372 192,372 C 282,372 352,312 352,222" fill="none" stroke="#2dd4bf" stroke-width="6" stroke-linecap="round" />
  </g>

  <!-- PDF Extraction Paper Symbol Background Layer -->
  <g transform="translate(290, 220) scale(0.95)" filter="url(#micShadow)">
    <rect x="-40" y="-50" width="100" height="130" rx="12" fill="#0f172a" stroke="#06b6d4" stroke-width="3" opacity="0.85" />
    <!-- Folding page corner symbol -->
    <path d="M 40,-50 L 60,-30 L 40,-30 Z" fill="#06b6d4" />
    <!-- Paper Lines representing parsed text -->
    <line x1="-25" y1="-25" x2="35" y2="-25" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" />
    <line x1="-25" y1="-5" x2="15" y2="-5" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" />
    <line x1="-25" y1="15" x2="35" y2="15" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" />
    <line x1="-25" y1="35" x2="5" y2="35" stroke="#2dd4bf" stroke-width="3" stroke-linecap="round" />
    <line x1="-25" y1="55" x2="25" y2="55" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Central Speech Recognition Microphone Model -->
  <g transform="translate(210, 220)" filter="url(#glow)">
    <!-- Outer holding stand of the mic -->
    <path d="M -60,0 C -60,45 -30,75 15,75 C 60,75 90,45 90,0" fill="none" stroke="url(#metalGrad)" stroke-width="12" stroke-linecap="round" />
    <!-- Base stand elements connecting downward -->
    <path d="M 15,75 L 15,115" stroke="url(#metalGrad)" stroke-width="12" stroke-linecap="round" />
    <path d="M -25,115 L 55,115" stroke="url(#metalGrad)" stroke-width="14" stroke-linecap="round" />
    
    <!-- Microhone grill upper structure -->
    <rect x="-35" y="-80" width="100" height="120" rx="42" fill="url(#metalGrad)" stroke="#115e59" stroke-width="1" />
    
    <!-- Pattern division overlay for modern mesh look -->
    <rect x="-35" y="-80" width="100" height="60" rx="42" fill="#0f766e" opacity="0.1" />
    <line x1="-35" y1="-20" x2="65" y2="-20" stroke="#0d9488" stroke-width="4" />
    
    <!-- Glowing Status Recording Dot -->
    <circle cx="15" cy="-20" r="10" fill="url(#goldGrad)" filter="url(#micShadow)" />
    <!-- Tiny microphone mesh lines -->
    <line x1="15" y1="-70" x2="15" y2="-30" stroke="#0f172a" stroke-width="2" opacity="0.25" stroke-dasharray="4 4" />
    <line x1="-15" y1="-50" x2="45" y2="-50" stroke="#0f172a" stroke-width="2" opacity="0.25" stroke-dasharray="4 4" />
  </g>

  <!-- Sparkles showing smart high-accuracy AI processing -->
  <g fill="#fbbf24">
    <!-- Top-Right Sparkle -->
    <path d="M 410,130 Q 425,130 425,115 Q 425,130 440,130 Q 425,130 425,145 Q 425,130 410,130 Z" />
    <!-- Mid-Left Sparkle -->
    <path d="M 80,330 Q 95,330 95,315 Q 95,330 110,330 Q 95,330 95,345 Q 95,330 80,330 Z" transform="scale(0.8) translate(20, 20)" />
    <!-- Secondary miniature spark -->
    <path d="M 330,360 Q 340,360 340,350 Q 340,360 350,360 Q 340,360 340,370 Q 340,360 330,360 Z" opacity="0.8" />
  </g>
</svg>
